{%- if page.dossier -%}
{%- assign dossier_page = site.writing | where: "url", page.dossier | first -%}
<div class="dossier">
  This essay is part of the dossier: &nbsp;
  {%- if dossier_page -%}
  <a href="{{ dossier_page.url }}">{{ dossier_page.title }}</a>.
  {%- else -%}
  <a href="{{ page.dossier }}">{{ page.dossier }}</a>.
  {%- endif -%}
</div>
{%- endif -%}
